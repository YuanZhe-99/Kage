name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-agent:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Build Swift Package
        run: |
          cd Agent
          swift build -c release

      - name: Build Xcode Project
        run: |
          xcodebuild -project Agent/ContextHelper.xcodeproj \
                     -scheme ContextHelper \
                     -configuration Release \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="-" \
                     CODE_SIGNING_REQUIRED=NO \
                     ARCHS="arm64 x86_64"

      - name: Package
        run: |
          mkdir -p dist
          cp -R build/Build/Products/Release/ContextHelper.app dist/
          hdiutil create -volname "ContextHelper" -srcfolder dist/ContextHelper.app -ov -format UDZO dist/ContextHelper.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/ContextHelper.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-controller:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Build Swift Package
        run: |
          cd Controller/macOS
          swift build -c release

      - name: Build Xcode Project
        run: |
          xcodebuild -project Controller/macOS/KageController.xcodeproj \
                     -scheme KageController \
                     -configuration Release \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="-" \
                     CODE_SIGNING_REQUIRED=NO \
                     ARCHS="arm64 x86_64"

      - name: Package
        run: |
          mkdir -p dist
          cp -R build/Build/Products/Release/KageController.app dist/
          hdiutil create -volname "KageController" -srcfolder dist/KageController.app -ov -format UDZO dist/KageController.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/KageController.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-signaling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Signaling Server
        run: |
          cd Signaling
          GOOS=linux GOARCH=amd64 go build -o dist/signaling-server

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: Signaling/dist/signaling-server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
